<!DOCTYPE html>
<html>

  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              fin: {
                bg:      '#0e0f11',
                surface: '#131722',
                card:    '#1a1d27',
                border:  '#2a2e39',
                muted:   '#4b5563',
                green:   '#089981',
                red:     '#f23645',
              }
            }
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"
      integrity="sha512-iBBXm8fW90+nuLcSKlbmrPcLa0OT92xO1BIsZ+ywDWZCvqsWgccV3gFoRBv0z+8dLJgyAHIhR35VZc2oM/gI1w=="
      crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="css/app.css" rel="stylesheet" type="text/css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/2.6.12/vue.min.js"
      integrity="sha512-BKbSR+cfyxLdMAsE0naLReFSLg8/pjbgfxHh/k/kUC82Hy7r6HtR5hLhobaln2gcTvzkyyehrdREdjpsQwy2Jw=="
      crossorigin="anonymous"></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/vue-router/3.4.3/vue-router.min.js"
      integrity="sha512-mVyZZ423iwLddhRdWCJeQSysHfnDZZPJRlY9HJI6/39e6D8Myz3nQCelJmSMOf8MOreTzWDmh8bYftrBnTau1Q=="
      crossorigin="anonymous"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/http-vue-loader@1.4.2/src/httpVueLoader.min.js"></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/axios/0.20.0/axios.min.js"
      integrity="sha512-quHCp3WbBNkwLfYUMd+KwBAgpVukJu5MncuQaWXgCrfgcxCJAq/fo+oqrRKOj+UKEmyMCG3tb8RB63W+EmrOBg=="
      crossorigin="anonymous"></script>
    <script src="https://unpkg.com/dayjs@1.8.21/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.3.2/dist/chart.min.js"
      integrity="sha256-qoN08nWXsFH+S9CtIq99e5yzYHioRHtNB9t2qy1MSmc="
      crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-TJWWQVVMP3"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());      
      gtag('config', 'G-TJWWQVVMP3',{});
      
</script>
    <title>小貓選股</title>
  </head>
  <body class="bg-fin-bg min-h-screen text-slate-200">
    <div id="app">
      <header class="sticky top-0 z-50 flex flex-col md:flex-row items-center px-6 py-3 bg-fin-bg/95 backdrop-blur-md border-b border-fin-border shadow-lg mb-8">
        <h3 class="text-xl font-bold text-slate-100 md:mr-auto my-1 md:my-0 tracking-tight flex items-center gap-2">
          <svg width="22" height="14" viewBox="0 0 22 14" fill="none" class="text-fin-green flex-shrink-0">
            <polyline points="1,13 5,7 9,10 13,3 17,6 21,1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span><i class="fas fa-paw text-amber-400"></i> 小貓選股 <i class="fas fa-paw text-amber-400"></i></span>
          <span v-if="lastUpdated" class="text-xs text-fin-muted font-normal hidden lg:inline ml-1">更新 {{ lastUpdated }}</span>
        </h3>
        <nav class="flex mt-2 md:mt-0">
          <router-link class="nav-link px-4 py-2 text-slate-400 hover:text-sky-400 transition-colors text-sm font-medium border-b-2 border-transparent" :to="{
            params:{Market:'tw'},
            name:'market'}">台股</router-link>
          <router-link class="nav-link px-4 py-2 text-slate-400 hover:text-sky-400 transition-colors text-sm font-medium border-b-2 border-transparent" :to="{
            params:{Market:'us'},
            name:'market'}">美股</router-link>
          <router-link class="nav-link px-4 py-2 text-slate-400 hover:text-sky-400 transition-colors text-sm font-medium border-b-2 border-transparent" :to="{
              name:'method'}">交易策略</router-link>
          <router-link class="nav-link px-4 py-2 text-slate-400 hover:text-sky-400 transition-colors text-sm font-medium border-b-2 border-transparent" :to="{
              name:'about'}">關於🐈</router-link>
        </nav>
      </header>
      <main class="max-w-7xl mx-auto px-4 pb-12">
        <router-view></router-view>
      </main>

    </div>
    <script src="js/app.js"></script>
  </body>

</html>
